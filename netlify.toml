[build]
  command = "npm run build"
  publish = "dist"
  # Builds are OPT-IN (2026-06-11, Tish's call after the usage_exceeded suspension): automation pushes to
  # this repo near-daily and each auto-build burned ~15 credits — 20 builds of an unchanged app ate the
  # month. `exit 0` = ALWAYS skip CI builds; the live site keeps serving its last deploy. To actually ship
  # app changes, deploy manually:  npx netlify deploy --build --prod   (or temporarily restore the previous
  # diff-based ignore rule from git history: commit 68765f4).
  ignore = "exit 0"

[build.environment]
  NODE_VERSION = "22"

# ── API routes → Netlify Functions ──────────────────────────────────────────
# These MUST come before the SPA catch-all below.

[[redirects]]
  from = "/api/hub"
  to = "/.netlify/functions/hub"
  status = 200

[[redirects]]
  from = "/api/hub/notes"
  to = "/.netlify/functions/hub-notes"
  status = 200

[[redirects]]
  from = "/api/field-submissions"
  to = "/.netlify/functions/field-submissions"
  status = 200

[[redirects]]
  from = "/api/geocode"
  to = "/.netlify/functions/geocode"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/auth/status"
  to = "/.netlify/functions/auth-status"
  status = 200

# ── SPA routing fallback ────────────────────────────────────────────────────
# Serves index.html for everything not matched above.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
