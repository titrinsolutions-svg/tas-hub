[build]
  command = "npm run build"
  publish = "dist"
  # Skip the build (saves ~15 credits/deploy) when a push touches ONLY docs/audits/markdown —
  # the 2026-06 usage_exceeded outage was 20 deploys x 15 credits, mostly docs-only pushes.
  # Exit 0 = skip build; non-zero = build.
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- . ':(exclude)docs' ':(exclude)audits' ':(exclude)*.md' ':(exclude).superpowers'"

[build.environment]
  NODE_VERSION = "22"

# ── API routes → Netlify Functions ──────────────────────────────────────────
# These MUST come before the SPA catch-all below.

[[redirects]]
  from = "/api/hub"
  to = "/.netlify/functions/hub"
  status = 200

[[redirects]]
  from = "/api/hub/notes"
  to = "/.netlify/functions/hub-notes"
  status = 200

[[redirects]]
  from = "/api/field-submissions"
  to = "/.netlify/functions/field-submissions"
  status = 200

[[redirects]]
  from = "/api/geocode"
  to = "/.netlify/functions/geocode"
  status = 200

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/auth/status"
  to = "/.netlify/functions/auth-status"
  status = 200

# ── SPA routing fallback ────────────────────────────────────────────────────
# Serves index.html for everything not matched above.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
